name: Guestbook

on:
  issue_comment:
    types: [created, edited, deleted]

concurrency:
  group: guestbook
  cancel-in-progress: false

jobs:
  update_guestbook:
    name: Update guestbook
    if: ${{ github.event.issue.title == 'Guestbook' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update guestbook
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            function formatDate(dateStr) {
              const d = new Date(dateStr);
              const pad = n => String(n).padStart(2, '0');
              return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            }

            function getFlag(location) {
              if (!location) return '';
              
              // ISO 3166-1 Alpha-2 Code aus der Location extrahieren
              // Zuerst: direkt 2-Buchstaben-Code am Ende oder allein
              const twoLetterMatch = location.trim().match(/\b([A-Za-z]{2})\b$/);
              
              // Country name → ISO code mapping (alle UN-anerkannten Länder + häufige Varianten)
              const nameToCode = {
                // A
                'afghanistan': 'AF', 'albania': 'AL', 'algeria': 'DZ', 'andorra': 'AD',
                'angola': 'AO', 'argentina': 'AR', 'armenia': 'AM', 'australia': 'AU',
                'austria': 'AT', 'azerbaijan': 'AZ', 'österreich': 'AT',
                // B
                'bahamas': 'BS', 'bahrain': 'BH', 'bangladesh': 'BD', 'barbados': 'BB',
                'belarus': 'BY', 'belgium': 'BE', 'belgien': 'BE', 'belize': 'BZ',
                'benin': 'BJ', 'bhutan': 'BT', 'bolivia': 'BO', 'bosnia': 'BA',
                'botswana': 'BW', 'brazil': 'BR', 'brasil': 'BR', 'brunei': 'BN',
                'bulgaria': 'BG', 'burkina faso': 'BF', 'burundi': 'BI',
                // C
                'cambodia': 'KH', 'cameroon': 'CM', 'canada': 'CA', 'cape verde': 'CV',
                'central african republic': 'CF', 'chad': 'TD', 'chile': 'CL',
                'china': 'CN', 'colombia': 'CO', 'comoros': 'KM', 'congo': 'CG',
                'costa rica': 'CR', 'croatia': 'HR', 'cuba': 'CU', 'cyprus': 'CY',
                'czech republic': 'CZ', 'czechia': 'CZ', 'tschechien': 'CZ',
                // D
                'denmark': 'DK', 'dänemark': 'DK', 'djibouti': 'DJ', 'dominica': 'DM',
                'dominican republic': 'DO',
                // E
                'ecuador': 'EC', 'egypt': 'EG', 'ägypten': 'EG', 'el salvador': 'SV',
                'equatorial guinea': 'GQ', 'eritrea': 'ER', 'estonia': 'EE',
                'eswatini': 'SZ', 'ethiopia': 'ET',
                // F
                'fiji': 'FJ', 'finland': 'FI', 'finnland': 'FI', 'france': 'FR',
                'frankreich': 'FR',
                // G
                'gabon': 'GA', 'gambia': 'GM', 'georgia': 'GE', 'germany': 'DE',
                'deutschland': 'DE', 'ghana': 'GH', 'greece': 'GR', 'griechenland': 'GR',
                'grenada': 'GD', 'guatemala': 'GT', 'guinea': 'GN',
                'guinea-bissau': 'GW', 'guyana': 'GY',
                // H
                'haiti': 'HT', 'honduras': 'HN', 'hungary': 'HU', 'ungarn': 'HU',
                // I
                'iceland': 'IS', 'island': 'IS', 'india': 'IN', 'indonesia': 'ID',
                'iran': 'IR', 'iraq': 'IQ', 'ireland': 'IE', 'irland': 'IE',
                'israel': 'IL', 'italy': 'IT', 'italien': 'IT', 'ivory coast': 'CI',
                "cote d'ivoire": 'CI',
                // J
                'jamaica': 'JM', 'japan': 'JP', 'jordan': 'JO',
                // K
                'kazakhstan': 'KZ', 'kenya': 'KE', 'kiribati': 'KI', 'kuwait': 'KW',
                'kyrgyzstan': 'KG',
                // L
                'laos': 'LA', 'latvia': 'LV', 'lebanon': 'LB', 'lesotho': 'LS',
                'liberia': 'LR', 'libya': 'LY', 'liechtenstein': 'LI', 'lithuania': 'LT',
                'luxembourg': 'LU', 'luxemburg': 'LU',
                // M
                'madagascar': 'MG', 'malawi': 'MW', 'malaysia': 'MY', 'maldives': 'MV',
                'mali': 'ML', 'malta': 'MT', 'marshall islands': 'MH', 'mauritania': 'MR',
                'mauritius': 'MU', 'mexico': 'MX', 'mexiko': 'MX', 'micronesia': 'FM',
                'moldova': 'MD', 'monaco': 'MC', 'mongolia': 'MN', 'montenegro': 'ME',
                'morocco': 'MA', 'marokko': 'MA', 'mozambique': 'MZ', 'myanmar': 'MM',
                // N
                'namibia': 'NA', 'nauru': 'NR', 'nepal': 'NP', 'netherlands': 'NL',
                'niederlande': 'NL', 'new zealand': 'NZ', 'neuseeland': 'NZ',
                'nicaragua': 'NI', 'niger': 'NE', 'nigeria': 'NG', 'north korea': 'KP',
                'north macedonia': 'MK', 'norway': 'NO', 'norwegen': 'NO',
                // O
                'oman': 'OM',
                // P
                'pakistan': 'PK', 'palau': 'PW', 'palestine': 'PS', 'panama': 'PA',
                'papua new guinea': 'PG', 'paraguay': 'PY', 'peru': 'PE',
                'philippines': 'PH', 'poland': 'PL', 'polen': 'PL', 'portugal': 'PT',
                // Q
                'qatar': 'QA',
                // R
                'romania': 'RO', 'rumänien': 'RO', 'russia': 'RU', 'russland': 'RU',
                'rwanda': 'RW',
                // S
                'saint kitts and nevis': 'KN', 'saint lucia': 'LC',
                'saint vincent': 'VC', 'samoa': 'WS', 'san marino': 'SM',
                'sao tome and principe': 'ST', 'saudi arabia': 'SA',
                'saudi-arabien': 'SA', 'senegal': 'SN', 'serbia': 'RS', 'serbien': 'RS',
                'seychelles': 'SC', 'sierra leone': 'SL', 'singapore': 'SG',
                'singapur': 'SG', 'slovakia': 'SK', 'slowakei': 'SK',
                'slovenia': 'SI', 'slowenien': 'SI', 'solomon islands': 'SB',
                'somalia': 'SO', 'south africa': 'ZA', 'südafrika': 'ZA',
                'south korea': 'KR', 'korea': 'KR', 'south sudan': 'SS', 'spain': 'ES',
                'spanien': 'ES', 'sri lanka': 'LK', 'sudan': 'SD', 'suriname': 'SR',
                'sweden': 'SE', 'schweden': 'SE', 'switzerland': 'CH', 'schweiz': 'CH',
                'syria': 'SY',
                // T
                'taiwan': 'TW', 'tajikistan': 'TJ', 'tanzania': 'TZ', 'thailand': 'TH',
                'timor-leste': 'TL', 'togo': 'TG', 'tonga': 'TO',
                'trinidad and tobago': 'TT', 'tunisia': 'TN', 'turkey': 'TR',
                'türkei': 'TR', 'türkiye': 'TR', 'turkmenistan': 'TM', 'tuvalu': 'TV',
                // U
                'uganda': 'UG', 'ukraine': 'UA', 'united arab emirates': 'AE',
                'uae': 'AE', 'united kingdom': 'GB', 'uk': 'GB', 'england': 'GB',
                'scotland': 'GB', 'wales': 'GB', 'united states': 'US', 'usa': 'US',
                'uruguay': 'UY', 'uzbekistan': 'UZ',
                // V
                'vanuatu': 'VU', 'vatican': 'VA', 'vatikan': 'VA', 'venezuela': 'VE',
                'vietnam': 'VN',
                // Y
                'yemen': 'YE',
                // Z
                'zambia': 'ZM', 'zimbabwe': 'ZW',
              };
            
              const loc = location.toLowerCase().trim();
            
              // 1. Direkt im nameToCode nachschlagen (substring match)
              for (const [name, code] of Object.entries(nameToCode)) {
                if (loc.includes(name)) return codeToFlag(code);
              }
            
              // 2. Fallback: 2-Buchstaben ISO-Code direkt konvertieren
              if (twoLetterMatch) {
                const code = twoLetterMatch[1].toUpperCase();
                // Nur wenn es ein plausibler Ländercode ist (nicht "St" aus "St. Gallen" etc.)
                if (code.match(/^[A-Z]{2}$/) && !['ST', 'DR', 'MR', 'MS'].includes(code)) {
                  return codeToFlag(code);
                }
              }
            
              return '';
            }
            
            function codeToFlag(code) {
              // Regional Indicator Symbols: A=0x1F1E6, Z=0x1F1FF
              return [...code.toUpperCase()].map(c =>
                String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))
              ).join('');
            }

            async function geocode(location) {
              try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1`;
                const res = await fetch(url, { headers: { 'User-Agent': 'github-guestbook-action' } });
                const data = await res.json();
                if (data.length > 0) {
                  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                }
              } catch (e) {
                console.log(`Geocoding fehlgeschlagen fuer "${location}": ${e.message}`);
              }
              return { lat: null, lon: null };
            }

            async function generateMapSVG(entries) {
              const withCoords = entries.filter(e => e.lat !== null && e.lon !== null);
              const W = 860, H = 440;

              const geoRes = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
              const world = await geoRes.json();

              function project(lon, lat) {
                const x = (lon + 180) / 360 * W;
                const y = (90 - lat) / 180 * H;
                return [Math.round(x * 10) / 10, Math.round(y * 10) / 10];
              }

              function geometryToPath(geometry) {
                const polys = geometry.type === 'Polygon'
                  ? [geometry.coordinates]
                  : geometry.coordinates;
                return polys.map(poly =>
                  poly.map(ring =>
                    ring.map((c, i) => {
                      const [x, y] = project(c[0], c[1]);
                      return `${i === 0 ? 'M' : 'L'}${x},${y}`;
                    }).join(' ') + 'Z'
                  ).join(' ')
                ).join(' ');
              }

              const landPaths = world.features.map(f => {
                try {
                  const d = geometryToPath(f.geometry);
                  return `<path d="${d}" fill="#21262d" stroke="#30363d" stroke-width="0.4"/>`;
                } catch(e) { return ''; }
              }).filter(Boolean).join('\n');

              const markers = withCoords.map(e => {
                const [x, y] = project(e.lon, e.lat);
                return `<g>
                  <circle cx="${x}" cy="${y}" r="5" fill="#238636" stroke="#2ea043" stroke-width="1.5" opacity="0.9"/>
                  <circle cx="${x}" cy="${y}" r="10" fill="#238636" opacity="0.2"/>
                  <title>@${e.username}${e.location ? ' - ' + e.location : ''}</title>
                </g>`;
              }).join('\n');

              const count = withCoords.length;

              return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
                <rect width="${W}" height="${H}" fill="#0d1117" rx="8"/>
                <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="#21262d" stroke-width="0.8" stroke-dasharray="4,4"/>
                ${landPaths}
                ${markers}
                <text x="12" y="${H - 10}" fill="#8b949e" font-size="11" font-family="sans-serif">${count} visitor${count !== 1 ? 's' : ''} from around the world</text>
              </svg>`;
            }

            function generateTable(entries) {
              if (entries.length === 0) return '_No entries yet. Be the first to sign!_\n';

              const latest = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
              const latestLine = `> 👋 Last signed by [@${latest.username}](https://github.com/${latest.username}) on ${latest.date}\n\n`;
              const header = `| | Name | Date | Message |\n|---|---|---|---|\n`;
              const rows = entries.map(e => {
                const avatar = `<img src="https://avatars.githubusercontent.com/${e.username}" width="60" height="60"/>`;
                const flag = e.location ? ' ' + getFlag(e.location) : '';
                const msg = (e.message || '').replace(/\|/g, '\\|').replace(/(\r\n|\r|\n)/g, ' ');
                return `| ${avatar} | [@${e.username}](https://github.com/${e.username})${flag} | ${e.date} | ${msg} |`;
              }).join('\n');

              return latestLine + header + rows + '\n';
            }

            // Kommentare holen
            const query = `query($owner:String!, $name:String!, $issue_number:Int!) {
              repository(owner:$owner, name:$name) {
                issue(number:$issue_number) {
                  comments(first:100, orderBy:{direction:DESC, field:UPDATED_AT}) {
                    nodes {
                      author {
                        login
                        url
                        ... on User {
                          location
                        }
                      }
                      bodyText
                      updatedAt
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              name: context.repo.repo,
              issue_number: context.issue.number
            });

            const comments = result.repository.issue.comments.nodes;

            // guestbook.json laden
            let stored = [];
            if (fs.existsSync('guestbook.json')) {
              const raw = fs.readFileSync('guestbook.json', 'utf8').trim();
              if (raw && raw !== '[]') {
                try { stored = JSON.parse(raw); } catch(e) { stored = []; }
              }
            }

            const storedMap = Object.fromEntries(stored.map(e => [e.username, e]));

            // Eintraege updaten
            for (const comment of comments) {
              const username = comment.author.login;
              const location = comment.author.location || null;
              const existing = storedMap[username];

              if (!existing || existing.location !== location) {
                let coords = { lat: null, lon: null };
                if (location) coords = await geocode(location);
                storedMap[username] = {
                  username,
                  message: comment.bodyText.trim(),
                  date: formatDate(comment.updatedAt),
                  location,
                  lat: coords.lat,
                  lon: coords.lon,
                };
              } else {
                storedMap[username].message = comment.bodyText.trim();
                storedMap[username].date = formatDate(comment.updatedAt);
              }
            }

            // Geloeschte Kommentare entfernen
            const activeUsernames = new Set(comments.map(c => c.author.login));
            const entries = Object.values(storedMap).filter(e => activeUsernames.has(e.username));

            // Nach Datum sortieren (neueste zuerst)
            entries.sort((a, b) => new Date(a.date) - new Date(b.date));

            fs.writeFileSync('guestbook.json', JSON.stringify(entries, null, 2), 'utf8');
            fs.writeFileSync('guestbook-map.svg', await generateMapSVG(entries), 'utf8');

            // README updaten
            let readme = fs.readFileSync('README.md', 'utf8');
            const newContent = generateTable(entries);
            readme = readme.replace(
              /<!-- Guestbook -->\n[\s\S]*?<!-- \/Guestbook -->/,
              `<!-- Guestbook -->\n${newContent}<!-- /Guestbook -->`
            );
            fs.writeFileSync('README.md', readme, 'utf8');

      - name: Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase --autostash origin main
          git add README.md guestbook.json guestbook-map.svg
          git commit -m '✍️ guestbook update' || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
