name: Guestbook

on:
  issue_comment:
    types: [created, edited, deleted]

jobs:
  update_guestbook:
    name: Update guestbook
    if: ${{ github.event.issue.title == 'Guestbook' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update guestbook
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // ── Hilfsfunktionen ──────────────────────────────────────────────

            function project(lon, lat) {
              const x = ((lon + 180) / 360) * 860;
              const y = ((90 - lat) / 180) * 440;
              return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
            }

            function getFlag(location) {
              const loc = location.toLowerCase();
              const map = {
                'switzerland': '🇨🇭', 'ch': '🇨🇭',
                'germany': '🇩🇪', 'deutschland': '🇩🇪', 'de': '🇩🇪',
                'austria': '🇦🇹', 'österreich': '🇦🇹', 'at': '🇦🇹',
                'united states': '🇺🇸', 'usa': '🇺🇸', 'us': '🇺🇸',
                'united kingdom': '🇬🇧', 'uk': '🇬🇧', 'gb': '🇬🇧',
                'france': '🇫🇷', 'frankreich': '🇫🇷', 'fr': '🇫🇷',
                'netherlands': '🇳🇱', 'nl': '🇳🇱',
                'canada': '🇨🇦', 'ca': '🇨🇦',
                'australia': '🇦🇺', 'au': '🇦🇺',
                'japan': '🇯🇵', 'jp': '🇯🇵',
                'india': '🇮🇳', 'in': '🇮🇳',
                'brazil': '🇧🇷', 'brasil': '🇧🇷', 'br': '🇧🇷',
                'sweden': '🇸🇪', 'se': '🇸🇪',
                'norway': '🇳🇴', 'no': '🇳🇴',
                'denmark': '🇩🇰', 'dk': '🇩🇰',
                'finland': '🇫🇮', 'fi': '🇫🇮',
                'poland': '🇵🇱', 'pl': '🇵🇱',
                'italy': '🇮🇹', 'italien': '🇮🇹', 'it': '🇮🇹',
                'spain': '🇪🇸', 'spanien': '🇪🇸', 'es': '🇪🇸',
                'portugal': '🇵🇹', 'pt': '🇵🇹',
                'russia': '🇷🇺', 'ru': '🇷🇺',
                'china': '🇨🇳', 'cn': '🇨🇳',
                'south korea': '🇰🇷', 'korea': '🇰🇷', 'kr': '🇰🇷',
              };
              for (const [key, flag] of Object.entries(map)) {
                if (loc.includes(key)) return flag;
              }
              return '';
            }

            async function geocode(location) {
              try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1`;
                const res = await fetch(url, { headers: { 'User-Agent': 'github-guestbook-action' } });
                const data = await res.json();
                if (data.length > 0) {
                  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                }
              } catch (e) {
                console.log(`Geocoding fehlgeschlagen für "${location}": ${e.message}`);
              }
              return { lat: null, lon: null };
            }

            function generateMapSVG(entries) {
              const withCoords = entries.filter(e => e.lat !== null && e.lon !== null);
              const points = withCoords.map(e => {
                const { x, y } = project(e.lon, e.lat);
                return `  <g>
                  <circle cx="${x}" cy="${y}" r="5" fill="#238636" stroke="#2ea043" stroke-width="1.5" opacity="0.85"/>
                  <circle cx="${x}" cy="${y}" r="9" fill="#238636" opacity="0.2"/>
                  <title>@${e.username}${e.location ? ' · ' + e.location : ''}</title>
                </g>`;
              }).join('\n');

              const count = withCoords.length;

              // Vereinfachte Kontinente als Pfade
              const landPaths = [
                "M 72 150 L 78 145 L 90 143 L 105 148 L 118 145 L 125 150 L 130 158 L 128 168 L 120 175 L 108 178 L 95 175 L 82 168 L 72 158 Z",
                "M 118 145 L 135 138 L 150 135 L 165 138 L 175 148 L 178 160 L 172 172 L 160 178 L 145 180 L 132 175 L 122 165 L 118 150 Z",
                "M 165 138 L 185 130 L 205 128 L 220 132 L 232 142 L 238 155 L 235 168 L 225 178 L 210 183 L 195 182 L 180 175 L 170 162 L 165 148 Z",
                "M 220 100 L 240 92 L 265 88 L 290 90 L 310 98 L 322 112 L 325 128 L 318 142 L 302 152 L 282 158 L 260 158 L 240 152 L 225 140 L 218 124 Z",
                "M 290 90 L 315 82 L 345 78 L 375 80 L 400 88 L 418 102 L 425 120 L 420 138 L 405 152 L 385 160 L 360 162 L 335 158 L 312 148 L 298 132 L 290 108 Z",
                "M 375 80 L 405 72 L 440 68 L 475 70 L 505 80 L 522 96 L 528 115 L 522 133 L 505 148 L 482 158 L 455 162 L 428 158 L 405 146 L 390 128 L 382 108 Z",
                "M 475 70 L 508 62 L 545 58 L 582 60 L 612 72 L 630 90 L 635 112 L 628 132 L 610 148 L 585 158 L 555 162 L 525 158 L 500 146 L 482 128 L 475 105 Z",
                "M 555 58 L 590 48 L 632 44 L 668 46 L 695 58 L 710 76 L 714 98 L 706 118 L 688 134 L 662 144 L 632 148 L 602 144 L 578 132 L 562 112 L 558 88 Z",
                "M 155 195 L 170 188 L 188 186 L 205 190 L 218 202 L 222 218 L 216 232 L 202 242 L 185 246 L 168 242 L 155 230 L 150 215 Z",
                "M 202 242 L 215 235 L 230 232 L 245 236 L 255 248 L 258 262 L 252 275 L 238 283 L 222 285 L 208 280 L 198 268 L 196 254 Z",
                "M 118 220 L 128 210 L 142 206 L 158 208 L 168 218 L 172 232 L 166 245 L 152 253 L 136 255 L 122 250 L 112 238 L 112 226 Z",
                "M 128 258 L 138 248 L 152 244 L 166 246 L 175 256 L 178 268 L 172 280 L 158 288 L 142 290 L 128 285 L 118 275 L 116 263 Z",
                "M 148 290 L 160 282 L 174 278 L 188 280 L 198 290 L 200 302 L 194 314 L 180 322 L 164 324 L 150 318 L 140 308 L 138 295 Z",
                "M 158 324 L 168 315 L 182 310 L 196 312 L 205 322 L 206 334 L 200 345 L 186 352 L 170 354 L 156 348 L 146 338 L 145 325 Z",
                "M 162 354 L 170 344 L 182 339 L 194 341 L 202 350 L 202 362 L 195 372 L 182 378 L 168 378 L 156 372 L 149 362 L 150 350 Z",
                "M 560 188 L 572 180 L 588 176 L 604 178 L 616 188 L 620 202 L 614 216 L 600 225 L 583 228 L 567 224 L 555 213 L 553 198 Z",
                "M 600 225 L 615 218 L 632 215 L 648 218 L 658 228 L 660 242 L 652 255 L 636 263 L 618 265 L 602 260 L 592 248 L 592 234 Z",
                "M 598 265 L 612 258 L 628 255 L 642 258 L 650 268 L 651 280 L 643 292 L 628 299 L 611 300 L 596 295 L 587 284 L 586 272 Z",
                "M 598 300 L 610 292 L 624 288 L 638 290 L 646 300 L 646 312 L 637 323 L 622 330 L 606 330 L 592 325 L 585 315 L 586 302 Z",
                "M 600 330 L 612 322 L 626 318 L 640 320 L 648 330 L 648 342 L 638 352 L 622 358 L 605 358 L 591 352 L 584 341 L 586 329 Z",
                "M 248 310 L 256 300 L 268 295 L 280 297 L 288 307 L 288 320 L 280 330 L 266 336 L 252 336 L 239 330 L 232 320 L 233 308 Z",
                "M 254 336 L 264 326 L 278 322 L 292 324 L 300 334 L 300 348 L 290 359 L 274 364 L 258 364 L 244 358 L 236 347 L 238 334 Z",
                "M 258 364 L 268 354 L 282 350 L 296 352 L 304 362 L 304 376 L 293 386 L 277 391 L 260 391 L 246 385 L 238 374 L 240 362 Z",
                "M 258 391 L 268 381 L 282 377 L 296 378 L 304 388 L 302 400 L 291 410 L 275 414 L 258 413 L 244 407 L 237 396 L 240 384 Z",
                "M 410 188 L 422 180 L 438 178 L 452 182 L 460 194 L 460 208 L 450 218 L 434 222 L 418 220 L 406 210 L 402 196 Z",
                "M 450 218 L 464 212 L 480 210 L 494 215 L 500 228 L 498 242 L 486 252 L 468 255 L 452 252 L 440 241 L 438 226 Z",
                "M 448 255 L 462 248 L 478 246 L 492 250 L 498 262 L 496 276 L 484 286 L 466 289 L 449 285 L 437 274 L 436 260 Z",
              ];

              const land = landPaths.map(d => `  <path d="${d}" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>`).join('\n');
              const grid = [0,1,2,3,4,5,6].map(i => `  <line x1="${i*143}" y1="0" x2="${i*143}" y2="440" stroke="#161b22" stroke-width="0.5"/>`).join('\n')
                + '\n' + [0,1,2,3,4].map(i => `  <line x1="0" y1="${i*110}" x2="860" y2="${i*110}" stroke="#161b22" stroke-width="0.5"/>`).join('\n');

              return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440">
              <rect width="860" height="440" fill="#0d1117" rx="8"/>
            ${grid}
              <line x1="0" y1="220" x2="860" y2="220" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
            ${land}
            ${points}
              <text x="16" y="428" fill="#8b949e" font-size="11" font-family="sans-serif">${count} visitor${count !== 1 ? 's' : ''} from around the world</text>
            </svg>`;
            }

            function generateTable(entries) {
              if (entries.length === 0) return '_No entries yet. Be the first to sign!_\n';

              const latest = entries[0];
              const latestLine = `> 👋 Last signed by [@${latest.username}](https://github.com/${latest.username}) on ${latest.date}\n\n`;
              const header = `| | Name | Date | Message |\n|---|---|---|---|\n`;
              const rows = entries.map(e => {
                const avatar = `<img src="https://avatars.githubusercontent.com/${e.username}" width="20" height="20"/>`;
                const flag = e.location ? ' ' + getFlag(e.location) : '';
                const msg = (e.message || '').replace(/\|/g, '\\|').replace(/(\r\n|\r|\n)/g, ' ').slice(0, 125);
                return `| ${avatar} | [@${e.username}](https://github.com/${e.username})${flag} | ${e.date} | ${msg} |`;
              }).join('\n');

              return latestLine + header + rows + '\n';
            }

            // ── Kommentare holen ─────────────────────────────────────────────

            const query = `query($owner:String!, $name:String!, $issue_number:Int!) {
              repository(owner:$owner, name:$name) {
                issue(number:$issue_number) {
                  comments(first:100, orderBy:{direction:DESC, field:UPDATED_AT}) {
                    nodes {
                      author {
                        login
                        url
                        ... on User {
                          location
                        }
                      }
                      bodyText
                      updatedAt
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              name: context.repo.repo,
              issue_number: context.issue.number
            });

            const comments = result.repository.issue.comments.nodes;

            // ── guestbook.json laden / updaten ───────────────────────────────

            let stored = [];
            if (fs.existsSync('guestbook.json')) {
              stored = JSON.parse(fs.readFileSync('guestbook.json', 'utf8'));
            }

            const storedMap = Object.fromEntries(stored.map(e => [e.username, e]));

            // Neue Einträge geocoden
            for (const comment of comments) {
              const username = comment.author.login;
              const location = comment.author.location || null;
              const existing = storedMap[username];

              if (!existing || existing.location !== location) {
                let coords = { lat: null, lon: null };
                if (location) {
                  coords = await geocode(location);
                }
                storedMap[username] = {
                  username,
                  message: comment.bodyText.trim(),
                  date: new Date(comment.updatedAt).toLocaleString('de-CH'),
                  location,
                  lat: coords.lat,
                  lon: coords.lon,
                };
              } else {
                // Nachricht updaten falls editiert
                storedMap[username].message = comment.bodyText.trim();
                storedMap[username].date = new Date(comment.updatedAt).toLocaleString('de-CH');
              }
            }

            // Gelöschte Kommentare entfernen
            const activeUsernames = new Set(comments.map(c => c.author.login));
            const entries = Object.values(storedMap).filter(e => activeUsernames.has(e.username));

            // Nach Datum sortieren (neueste zuerst)
            entries.sort((a, b) => new Date(b.date) - new Date(a.date));

            fs.writeFileSync('guestbook.json', JSON.stringify(entries, null, 2), 'utf8');

            // ── SVG generieren ───────────────────────────────────────────────

            fs.writeFileSync('guestbook-map.svg', generateMapSVG(entries), 'utf8');

            // ── README updaten ───────────────────────────────────────────────

            let readme = fs.readFileSync('README.md', 'utf8');
            const newContent = generateTable(entries);
            readme = readme.replace(
              /(?<=<!-- Guestbook -->\n)[\s\S]*?(?=<!-- \/Guestbook -->)/,
              newContent
            );
            fs.writeFileSync('README.md', readme, 'utf8');

      - name: Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md guestbook.json guestbook-map.svg
          git commit -m '✍️ guestbook update' || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
